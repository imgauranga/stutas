<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a1a"/>    
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>    
    <link href='https://i.ibb.co/b52pjVWp/IMG-20260403-210738-880.webp' rel='icon' type='image/x-icon'/>    
    <link href='https://i.ibb.co/b52pjVWp/IMG-20260403-210738-880.webp' rel='shortcut icon' type='image/x-icon'/>    
   
    <title>Gauranga</title>
    <style>
        .slide img {
  filter: grayscale(100%);

            width: 100%;
            height: 100%;
            object-fit: cover; 
            
            /* Disable selection and save menus */
            -webkit-touch-callout: none; /* Disables iOS Safari long-press menu */
            -webkit-user-select: none;   /* Safari */
            -khtml-user-select: none;     /* Konqueror HTML */
            -moz-user-select: none;        /* Firefox */
            -ms-user-select: none;         /* Internet Explorer/Edge */
            user-select: none;             /* Chrome, Opera, and Edge */
            pointer-events: none;          /* Makes the image un-clickable/un-draggable */
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: -webkit-fill-available; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }

        html {
            height: -webkit-fill-available;
        }

        .status-container {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            position: relative;
            background-color: #000;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        @media (max-width: 480px) {
            .status-container {
                max-width: 100%;
                height: 100vh;
                height: -webkit-fill-available;
                border-radius: 0;
            }
        }

        .slides-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            transition: transform 0.3s ease-in-out;
        }

        .slide {
            min-width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            position: relative;
        }

        .nav-btn {
            position: absolute;
            top: 0;
            height: 100%;
            width: 30%;
            z-index: 5;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .nav-left { left: 0; }
        .nav-right { right: 0; }

        .loading {
            position: absolute;
            color: white;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 16px;
            z-index: 2;
        }

        /* Bottom Text Details Section */
        .bottom-caption {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 40px 20px 30px 20px;
            /* Soft dark gradient backdrop for optimal text legibility */
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.85));
            color: white;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 4px;
            pointer-events: none; /* Allows navigation clicks to pass through if overlapping */
        }

        .caption-title {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.2px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* Gracefully truncates overly long filenames */
        }

        .caption-date {
            font-size: 12px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.65);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div class="status-container">
        <div class="loading" id="loadingText"></div>
       
        <div class="nav-btn nav-left" onclick="prevSlide()"></div>
        <div class="nav-btn nav-right" onclick="nextSlide()"></div>
        <div class="slides-wrapper" id="slidesWrapper"></div>
    </div>

    <script>
        // ✅ APNI DETAILS YAHAN BADLEIN
        const FOLDER_ID = '17xpGPnuLvMUmYQR2ONfdPGruYTKbCCe5'; 
        const API_KEY = 'AIzaSyD-7ifcYbg0I4v7l44yo-KfSO7SUNU8W28'; 

        const slidesWrapper = document.getElementById('slidesWrapper');
        const loadingText = document.getElementById('loadingText');
        
        let currentIndex = 0;
        let totalSlides = 0;
        let autoSlideInterval;
        const SLIDE_DURATION = 5000; // 5 Seconds

        // Helper function to turn ISO dates (e.g., 2026-06-10T...) into cleaner readable formats
        function formatDate(isoString) {
            if (!isoString) return '';
            const date = new Date(isoString);
            return date.toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            });
        }

        async function fetchDriveImages() {
            // Added 'createdTime' to fields payload requests
            const url = `https://www.googleapis.com/drive/v3/files?q='${FOLDER_ID}'+in+parents+and+mimeType+contains+'image/'&fields=files(id,name,createdTime)&key=${API_KEY}`;
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error.message);
                }

                if (data.files && data.files.length > 0) {
                    loadingText.style.display = 'none';
                    totalSlides = data.files.length;
                    
                    data.files.forEach((file) => {
                        const imageUrl = `https://lh3.googleusercontent.com/d/${file.id}=w1000`;
                        const cleanDate = formatDate(file.createdTime);
                        
                        // Remove common extensions like .jpg, .png from the displayed title 
                        const cleanTitle = file.name.replace(/\.[^/.]+$/, "");

                        const slideDiv = document.createElement('div');
                        slideDiv.classList.add('slide');
                        
                        slideDiv.innerHTML = `
                            <img src="${imageUrl}" alt="${file.name}">
                            <div class="bottom-caption">
                                <div class="caption-title">${cleanTitle}</div>
                                <div class="caption-date">Uploaded: ${cleanDate}</div>
                            </div>
                        `;
                        slidesWrapper.appendChild(slideDiv);
                    });

                    updateStatus();
                    startAutoSlide();
                } else {
                    loadingText.innerText = "Folder me koi images nahi mili!";
                }
            } catch (error) {
                console.error("Error fetching images:", error);
                loadingText.innerText = "Error: " + error.message;
            }
        }

        function startAutoSlide() {
            clearInterval(autoSlideInterval);
            autoSlideInterval = setInterval(() => {
                nextSlide();
            }, SLIDE_DURATION);
        }

        function updateStatus() {
            slidesWrapper.style.transform = `translateX(-${currentIndex * 100}%)`;
            startAutoSlide(); 
        }

        function nextSlide() {
            if (currentIndex < totalSlides - 1) {
                currentIndex++;
            } else {
                currentIndex = 0; 
            }
            updateStatus();
        }

        function prevSlide() {
            if (currentIndex > 0) {
                currentIndex--;
            } else {
                currentIndex = totalSlides - 1; 
            }
            updateStatus();
        }

        fetchDriveImages();
    </script>
</body>
</html>
